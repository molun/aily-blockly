name: CI & CD Pipeline

on:
  push:
    branches:
      - deploy
  workflow_dispatch:

jobs:
  # 任务 1：Windows 客户端构建
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'yarn'

      - name: Install Dependencies
        run: |
          npm install -g @angular/cli
          yarn install --frozen-lockfile
          cd electron && npm ci --force

      - name: Build Angular App
        run: |
          ng build --base-href ./
        env:
          NODE_ENV: production

      - name: Build Windows Unpacked
        run: |
          npx electron-builder build --win --dir
        env:
          NODE_ENV: production

      - name: Build NSIS Installer
        run: |
          npx electron-builder build --win nsis --prepackaged "dist/aily-blockly/win-unpacked"
        env:
          NODE_ENV: production

      # ================== SignPath 签名流程 ==================
      
      - name: Upload Unsigned Installer for Signing
        id: upload_unsigned
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-installer
          path: dist/aily-blockly/*.exe

      - name: Sign Installer with SignPath
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: 'bd01a768-a9e3-4a62-945d-fcfdc37a299e'
          project-slug: 'aily-blockly' 
          signing-policy-slug: 'test-signing'
          github-artifact-id: '${{ steps.upload_unsigned.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: 'dist/aily-blockly'

      # 重新生成 latest.yml（使用签名后的 exe hash）
      - name: Regenerate latest.yml with signed exe hash
        run: |
          cd dist/aily-blockly
          
          # 获取签名后的 exe 文件信息
          $exeFile = Get-ChildItem -Filter "*.exe" | Select-Object -First 1
          $exeSize = $exeFile.Length
          $exeName = $exeFile.Name
          
          Write-Host "✓ Signed exe: $exeName ($exeSize bytes)"
          
          # 计算签名后的 SHA512 hash（base64格式）
          $hash = Get-FileHash -Path $exeName -Algorithm SHA512
          $hashBytes = [System.Convert]::FromHexString($hash.Hash)
          $sha512Base64 = [System.Convert]::ToBase64String($hashBytes)
          
          Write-Host "✓ SHA512: $sha512Base64"
          
          # 从 package.json 读取版本号
          $packageJson = Get-Content "../../package.json" -Raw | ConvertFrom-Json
          $version = $packageJson.version
          
          # 获取发布日期（ISO 8601格式）
          $releaseDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ss.fffZ")
          
          # 生成新的 latest.yml 文件
          $latestYml = @"
          version: $version
          files:
            - url: $exeName
              sha512: $sha512Base64
              size: $exeSize
          path: $exeName
          sha512: $sha512Base64
          releaseDate: '$releaseDate'
          "@
          
          # 覆盖原有的 latest.yml
          $latestYml | Out-File -FilePath "latest.yml" -Encoding UTF8 -NoNewline
          
          Write-Host "✓ latest.yml regenerated with signed exe hash"
          Write-Host ""
          Write-Host "Content:"
          Get-Content "latest.yml"

      # ================== SignPath 签名流程结束 ==================

      - name: Archive Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AilyBlockly-Windows-Package
          path: dist/aily-blockly/
  
  # 任务 2：macOS 客户端构建
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'yarn'

      - name: Install Dependencies
        run: |
          npm install -g @angular/cli
          yarn install --frozen-lockfile
          cd electron && npm ci --force

      # --- 导入代码签名证书到 Keychain ---
      - name: Import Codesign Certificates
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_SIGNING_CERT }}
          p12-password: ${{ secrets.APPLE_SIGNING_PASSWORD }}

      - name: Verify Certificate Import
        run: |
          echo "Available signing identities:"
          security find-identity -v -p codesigning
          echo ""
          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -n 1)
          if [ -z "$IDENTITY" ]; then
            echo "❌ No Developer ID Application certificate found!"
            exit 1
          else
            echo "✅ Found: $IDENTITY"
          fi

      # --- 构建 + 签名 + 公证（和本地 Mac 一样） ---
      - name: Build, Sign & Notarize
        run: |
          npm run build:mac
        env:
          NODE_ENV: production
          # electron-builder 签名配置
          CSC_LINK: ${{ secrets.APPLE_SIGNING_CERT }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_SIGNING_PASSWORD }}
          # Apple 公证配置（electron-builder 要求的变量名）
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # --- 如果 electron-builder 公证失败，手动公证（支持 arm64 + x64 多个 DMG）---
      - name: Manual Notarization (if needed)
        if: always()
        run: |
          DMG_FILES=$(find dist/aily-blockly -name "*.dmg" -type f)
          
          if [ -z "$DMG_FILES" ]; then
            echo "⚠️ No DMG files found, skipping notarization."
            exit 0
          fi
          
          echo "Found DMG files:"
          echo "$DMG_FILES"
          echo ""
          
          while IFS= read -r DMG_PATH; do
            echo ">>> Processing: $DMG_PATH"
            
            echo "Checking if already notarized..."
            if xcrun stapler validate "$DMG_PATH" 2>/dev/null; then
              echo "✅ Already notarized and stapled: $DMG_PATH"
              continue
            fi
            
            echo "Submitting for notarization: $DMG_PATH"
            xcrun notarytool submit "$DMG_PATH" \
              --apple-id "${{ secrets.APPLE_ID }}" \
              --password "${{ secrets.APPLE_APP_PASSWORD }}" \
              --team-id "${{ secrets.APPLE_TEAM_ID }}" \
              --wait \
              --timeout 30m
            
            echo "Stapling..."
            xcrun stapler staple "$DMG_PATH"
            echo "✅ Notarization completed: $DMG_PATH"
            echo ""
          done <<< "$DMG_FILES"

      - name: Final Verification
        run: |
          echo "=== Verification ==="
          DMG_FILES=$(find dist/aily-blockly -name "*.dmg" -type f)
          if [ -z "$DMG_FILES" ]; then
            echo "⚠️ No DMG files found for verification."
            exit 0
          fi
          FAILED=0
          while IFS= read -r DMG_PATH; do
            echo "Verifying: $DMG_PATH"
            if xcrun stapler validate "$DMG_PATH"; then
              echo "✅ Notarized: $(basename $DMG_PATH)"
            else
              echo "⚠️ Not notarized: $(basename $DMG_PATH)"
              FAILED=1
            fi
          done <<< "$DMG_FILES"
          exit $FAILED
      
      - name: Archive macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AilyBlockly-macOS-Package
          path: dist/aily-blockly/

  # 任务 3：发布到 GitHub Release
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from package.json
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: v${VERSION}"

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: AilyBlockly-Windows-Package
          path: ./release

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: AilyBlockly-macOS-Package
          path: ./release

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            ./release/*.exe
            ./release/*.dmg
          draft: false
          prerelease: false
          update_release: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

