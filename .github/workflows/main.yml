name: CI & CD Pipeline

on:
  push:
    branches:
      - deploy
      - beta
  workflow_dispatch:

jobs:
  # 任务 1：Windows 国际版客户端构建
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            electron/package-lock.json

      - name: Install Dependencies
        run: |
          npm install -g @angular/cli
          npm ci --include=dev
          cd electron && npm ci --include=dev --force

      - name: Build Windows Package (Global)
        run: |
          npm run build:global
        env:
          NODE_ENV: production

      # ================== SignPath 签名流程 ==================
      
      - name: Upload Unsigned Installer for Signing
        id: upload_unsigned
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-installer-global
          path: dist/aily-blockly/*.exe

      - name: Sign Installer with SignPath
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: 'bd01a768-a9e3-4a62-945d-fcfdc37a299e'
          project-slug: 'aily-blockly' 
          signing-policy-slug: ${{ github.ref_name == 'beta' && 'test-signing' || 'release-signing' }}
          github-artifact-id: '${{ steps.upload_unsigned.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: 'dist/aily-blockly'

      # 删除签名前生成的 blockmap 文件（签名后 exe 内容已变，blockmap 中的 SHA256 分块校验会失败）
      - name: Remove stale blockmap files
        run: |
          Remove-Item -Path "dist/aily-blockly/*.blockmap" -Force -ErrorAction SilentlyContinue
          Write-Host "✓ Removed stale blockmap files"

      # 重新生成 latest.yml（使用签名后的 exe hash）
      - name: Regenerate latest.yml with signed exe hash
        run: |
          cd dist/aily-blockly
          
          # 列出目录文件（调试用）
          Write-Host "Files in dist/aily-blockly:"
          Get-ChildItem -File | ForEach-Object { Write-Host "  $($_.Name) ($($_.Length) bytes)" }
          
          # 获取签名后的 exe 文件（优先匹配安装包命名模式）
          $exeFile = Get-ChildItem -Filter "aily-blockly-Setup-*.exe" | Select-Object -First 1
          if (-not $exeFile) {
            $exeFile = Get-ChildItem -Filter "*.exe" | Select-Object -First 1
          }
          if (-not $exeFile) {
            Write-Error "No exe file found in dist/aily-blockly!"
            exit 1
          }
          $exeSize = $exeFile.Length
          $exeName = $exeFile.Name
          
          Write-Host "✓ Signed exe: $exeName ($exeSize bytes)"
          
          # 计算签名后的 SHA512 hash（base64格式）
          $hash = Get-FileHash -Path $exeFile.FullName -Algorithm SHA512
          $hashBytes = [System.Convert]::FromHexString($hash.Hash)
          $sha512Base64 = [System.Convert]::ToBase64String($hashBytes)
          
          Write-Host "✓ SHA512: $sha512Base64"
          Write-Host "✓ SHA512 length: $($sha512Base64.Length) chars"
          
          # 从 package.json 读取版本号
          $packageJson = Get-Content "../../package.json" -Raw | ConvertFrom-Json
          $version = $packageJson.version
          
          # 获取发布日期（ISO 8601格式）
          $releaseDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ss.fffZ")
          
          # 生成 latest.yml 内容（使用字符串拼接 + LF 换行符，避免 here-string 缩进问题）
          $lf = "`n"
          $content = "version: $version" + $lf +
                     "files:" + $lf +
                     "  - url: $exeName" + $lf +
                     "    sha512: $sha512Base64" + $lf +
                     "    size: $exeSize" + $lf +
                     "path: $exeName" + $lf +
                     "sha512: $sha512Base64" + $lf +
                     "releaseDate: '$releaseDate'" + $lf
          
          # 使用 .NET API 直接写入（确保 UTF-8 无 BOM，LF 换行符）
          $utf8NoBom = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::WriteAllText(
            (Join-Path $PWD "latest.yml"),
            $content,
            $utf8NoBom
          )
          
          Write-Host "✓ latest.yml regenerated with signed exe hash"
          Write-Host ""
          Write-Host "Content:"
          Get-Content "latest.yml"
          
          # 验证写入结果
          $verify = [System.IO.File]::ReadAllText((Join-Path $PWD "latest.yml"))
          if ($verify -notmatch [regex]::Escape($sha512Base64)) {
            Write-Error "Verification FAILED: sha512 not found in generated latest.yml!"
            Write-Host "Expected sha512: $sha512Base64"
            exit 1
          }
          Write-Host "✓ Verification passed: sha512 matches in latest.yml"

      # ================== SignPath 签名流程结束 ==================

      - name: Archive Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AilyBlockly-Windows-Package
          path: dist/aily-blockly/

  # 任务 1b：Windows 国内版客户端构建
  build-windows-cn:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            electron/package-lock.json

      - name: Install Dependencies
        run: |
          npm install -g @angular/cli
          npm ci --include=dev
          cd electron && npm ci --include=dev --force

      - name: Build Windows Package (CN)
        run: |
          npm run build:cn
        env:
          NODE_ENV: production

      - name: Upload Unsigned Installer for Signing (CN)
        id: upload_unsigned_cn
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-installer-cn
          path: dist/aily-blockly/*.exe

      - name: Sign Installer with SignPath (CN)
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: 'bd01a768-a9e3-4a62-945d-fcfdc37a299e'
          project-slug: 'aily-blockly'
          signing-policy-slug: ${{ github.ref_name == 'beta' && 'test-signing' || 'release-signing' }}
          github-artifact-id: '${{ steps.upload_unsigned_cn.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: 'dist/aily-blockly'

      - name: Remove stale blockmap files (CN)
        run: |
          Remove-Item -Path "dist/aily-blockly/*.blockmap" -Force -ErrorAction SilentlyContinue
          Write-Host "✓ Removed stale blockmap files"

      - name: Regenerate latest.yml with signed exe hash (CN)
        run: |
          cd dist/aily-blockly

          Write-Host "Files in dist/aily-blockly:"
          Get-ChildItem -File | ForEach-Object { Write-Host "  $($_.Name) ($($_.Length) bytes)" }

          $exeFile = Get-ChildItem -Filter "aily-blockly-CN-Setup-*.exe" | Select-Object -First 1
          if (-not $exeFile) {
            $exeFile = Get-ChildItem -Filter "*.exe" | Select-Object -First 1
          }
          if (-not $exeFile) {
            Write-Error "No exe file found in dist/aily-blockly!"
            exit 1
          }
          $exeSize = $exeFile.Length
          $exeName = $exeFile.Name

          Write-Host "✓ Signed exe: $exeName ($exeSize bytes)"

          $hash = Get-FileHash -Path $exeFile.FullName -Algorithm SHA512
          $hashBytes = [System.Convert]::FromHexString($hash.Hash)
          $sha512Base64 = [System.Convert]::ToBase64String($hashBytes)

          Write-Host "✓ SHA512: $sha512Base64"
          Write-Host "✓ SHA512 length: $($sha512Base64.Length) chars"

          $packageJson = Get-Content "../../package.json" -Raw | ConvertFrom-Json
          $version = $packageJson.version
          $releaseDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ss.fffZ")

          $lf = "`n"
          $content = "version: $version" + $lf +
                     "files:" + $lf +
                     "  - url: $exeName" + $lf +
                     "    sha512: $sha512Base64" + $lf +
                     "    size: $exeSize" + $lf +
                     "path: $exeName" + $lf +
                     "sha512: $sha512Base64" + $lf +
                     "releaseDate: '$releaseDate'" + $lf

          $utf8NoBom = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::WriteAllText(
            (Join-Path $PWD "latest-cn.yml"),
            $content,
            $utf8NoBom
          )

          Write-Host "✓ latest-cn.yml regenerated with signed exe hash"
          Write-Host ""
          Write-Host "Content:"
          Get-Content "latest-cn.yml"

          $verify = [System.IO.File]::ReadAllText((Join-Path $PWD "latest-cn.yml"))
          if ($verify -notmatch [regex]::Escape($sha512Base64)) {
            Write-Error "Verification FAILED: sha512 not found in generated latest-cn.yml!"
            Write-Host "Expected sha512: $sha512Base64"
            exit 1
          }
          Write-Host "✓ Verification passed: sha512 matches in latest-cn.yml"

      - name: Archive Windows Artifact (CN)
        uses: actions/upload-artifact@v4
        with:
          name: AilyBlockly-Windows-Package-cn
          path: dist/aily-blockly/
  
  # 任务 2：macOS 客户端构建
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            electron/package-lock.json

      - name: Install Dependencies
        run: |
          npm install -g @angular/cli
          npm ci --include=dev
          cd electron && npm ci --include=dev --force

      # --- 导入代码签名证书到 Keychain ---
      - name: Import Codesign Certificates
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_SIGNING_CERT }}
          p12-password: ${{ secrets.APPLE_SIGNING_PASSWORD }}

      - name: Verify Certificate Import
        run: |
          echo "Available signing identities:"
          security find-identity -v -p codesigning
          echo ""
          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -n 1)
          if [ -z "$IDENTITY" ]; then
            echo "❌ No Developer ID Application certificate found!"
            exit 1
          else
            echo "✅ Found: $IDENTITY"
          fi

      # --- 构建 + 签名 + 公证（仅构建 arm64）---
      - name: Build, Sign & Notarize
        run: |
          npm run build:global
        env:
          NODE_ENV: production
          # electron-builder 签名配置
          CSC_LINK: ${{ secrets.APPLE_SIGNING_CERT }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_SIGNING_PASSWORD }}
          # Apple 公证配置（electron-builder 要求的变量名）
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # --- 如果 electron-builder 公证失败，手动公证（处理 arm64 和 x64 两个 DMG）---
      - name: Manual Notarization (if needed)
        if: success() || failure()
        run: |
          DMG_FILES=$(find dist/aily-blockly -name "*.dmg" -type f)
          
          if [ -z "$DMG_FILES" ]; then
            echo "❌ DMG not found!"
            exit 1
          fi
          
          while IFS= read -r DMG_PATH; do
            echo "=== Processing: $DMG_PATH ==="
            
            echo "Checking if already notarized..."
            if xcrun stapler validate "$DMG_PATH" 2>/dev/null; then
              echo "✅ Already notarized and stapled: $DMG_PATH"
              continue
            fi
            
            echo "Submitting for notarization: $DMG_PATH"
            xcrun notarytool submit "$DMG_PATH" \
              --apple-id "${{ secrets.APPLE_ID }}" \
              --password "${{ secrets.APPLE_APP_PASSWORD }}" \
              --team-id "${{ secrets.APPLE_TEAM_ID }}" \
              --wait \
              --timeout 30m
            
            echo "Stapling..."
            xcrun stapler staple "$DMG_PATH"
            echo "✅ Notarization completed: $DMG_PATH"
          done <<< "$DMG_FILES"

      - name: Final Verification
        run: |
          echo "=== Verification ==="
          while IFS= read -r DMG_PATH; do
            xcrun stapler validate "$DMG_PATH" && echo "✅ Notarized: $DMG_PATH" || echo "⚠️ Not notarized: $DMG_PATH"
          done < <(find dist/aily-blockly -name "*.dmg" -type f)
      
      - name: Archive macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AilyBlockly-macOS-Package
          path: dist/aily-blockly/

  # 任务 2b：macOS 国内版客户端构建
  build-macos-cn:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            electron/package-lock.json

      - name: Install Dependencies
        run: |
          npm install -g @angular/cli
          npm ci --include=dev
          cd electron && npm ci --include=dev --force

      - name: Import Codesign Certificates
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_SIGNING_CERT }}
          p12-password: ${{ secrets.APPLE_SIGNING_PASSWORD }}

      - name: Verify Certificate Import
        run: |
          echo "Available signing identities:"
          security find-identity -v -p codesigning
          echo ""
          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -n 1)
          if [ -z "$IDENTITY" ]; then
            echo "❌ No Developer ID Application certificate found!"
            exit 1
          else
            echo "✅ Found: $IDENTITY"
          fi

      - name: Build, Sign & Notarize (CN)
        run: |
          npm run build:cn
        env:
          NODE_ENV: production
          CSC_LINK: ${{ secrets.APPLE_SIGNING_CERT }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_SIGNING_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Manual Notarization (if needed) (CN)
        if: success() || failure()
        run: |
          DMG_FILES=$(find dist/aily-blockly -name "aily-blockly-CN-*.dmg" -type f)

          if [ -z "$DMG_FILES" ]; then
            echo "❌ CN DMG not found!"
            exit 1
          fi

          while IFS= read -r DMG_PATH; do
            echo "=== Processing: $DMG_PATH ==="

            echo "Checking if already notarized..."
            if xcrun stapler validate "$DMG_PATH" 2>/dev/null; then
              echo "✅ Already notarized and stapled: $DMG_PATH"
              continue
            fi

            echo "Submitting for notarization: $DMG_PATH"
            xcrun notarytool submit "$DMG_PATH" \
              --apple-id "${{ secrets.APPLE_ID }}" \
              --password "${{ secrets.APPLE_APP_PASSWORD }}" \
              --team-id "${{ secrets.APPLE_TEAM_ID }}" \
              --wait \
              --timeout 30m

            echo "Stapling..."
            xcrun stapler staple "$DMG_PATH"
            echo "✅ Notarization completed: $DMG_PATH"
          done <<< "$DMG_FILES"

      - name: Final Verification (CN)
        run: |
          echo "=== Verification ==="
          while IFS= read -r DMG_PATH; do
            xcrun stapler validate "$DMG_PATH" && echo "✅ Notarized: $DMG_PATH" || echo "⚠️ Not notarized: $DMG_PATH"
          done < <(find dist/aily-blockly -name "aily-blockly-CN-*.dmg" -type f)

      - name: Rename latest-mac manifest (CN)
        run: |
          if [ -f "dist/aily-blockly/latest-mac.yml" ]; then
            mv "dist/aily-blockly/latest-mac.yml" "dist/aily-blockly/latest-mac-cn.yml"
            echo "✓ latest-mac-cn.yml generated"
          else
            echo "❌ latest-mac.yml not found after cn mac build"
            exit 1
          fi

      - name: Archive macOS Artifact (CN)
        uses: actions/upload-artifact@v4
        with:
          name: AilyBlockly-macOS-Package-cn
          path: dist/aily-blockly/

  # 任务 3：发布到 GitHub Release
  release:
    needs: [build-windows, build-windows-cn, build-macos, build-macos-cn]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整 git 历史，用于对比 tag 生成 changelog

      - name: Extract version from package.json
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: v${VERSION}"

      - name: Get Git Commits Since Last Release
        id: commits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          BASE_SHA=""

          # 策略1：从 release-meta 分支读取上次记录的 commit SHA（精确范围）
          echo "--- 尝试从 release-meta 分支读取上次发布的 SHA ---"
          git fetch origin release-meta 2>/dev/null || true
          if git ls-remote --heads origin release-meta 2>/dev/null | grep -q release-meta; then
            STORED_SHA=$(git show "origin/release-meta:last-sha-${BRANCH_NAME}" 2>/dev/null | tr -d '[:space:]' || echo "")
            if [ -n "$STORED_SHA" ]; then
              echo "✓ 读取到上次发布 SHA: $STORED_SHA"
              if git cat-file -e "${STORED_SHA}^{commit}" 2>/dev/null && git merge-base --is-ancestor "$STORED_SHA" HEAD 2>/dev/null; then
                echo "✓ SHA 有效，作为 changelog 起始点"
                BASE_SHA="$STORED_SHA"
              else
                echo "⚠️ 存储的 SHA 不在当前历史中（可能因 force-push/rebase），降级到 tag 策略"
              fi
            else
              echo "⚠️ release-meta 分支中 last-sha-${BRANCH_NAME} 不存在或为空，降级到 tag 策略"
            fi
          else
            echo "⚠️ release-meta 分支不存在（首次发布），降级到 tag 策略"
          fi

          # 策略2（降级）：通过 GitHub API 获取上一个 Release tag
          if [ -z "$BASE_SHA" ]; then
            CURRENT_TAG="${{ steps.version.outputs.tag }}"
            echo "--- 降级：通过 GitHub API 获取上一个 Release tag ---"
            PREV_TAG=""

              if [ "$BRANCH_NAME" = "beta" ]; then
                echo "按 beta 预发布记录查找上一个 Release tag..."
                PREV_TAG=$(gh api "repos/${GITHUB_REPOSITORY}/releases" \
                  --jq '.[] | select(.prerelease == true) | .tag_name' 2>/dev/null \
                  | grep -v "^${CURRENT_TAG}$" | head -n 1 || echo "")
                [ -n "$PREV_TAG" ] && echo "✓ 找到上一个 beta Release tag: $PREV_TAG"
              else
                LATEST_RELEASE_TAG=$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq '.tag_name' 2>/dev/null || echo "")

                if [ -n "$LATEST_RELEASE_TAG" ] && [ "$LATEST_RELEASE_TAG" != "$CURRENT_TAG" ]; then
                  echo "✓ GitHub API 返回上一个正式 Release tag: $LATEST_RELEASE_TAG"
                  PREV_TAG="$LATEST_RELEASE_TAG"
                elif [ "$LATEST_RELEASE_TAG" = "$CURRENT_TAG" ]; then
                  echo "⚠️ 最新正式 Release 就是当前版本，尝试获取上一个..."
                  PREV_TAG=$(gh api "repos/${GITHUB_REPOSITORY}/releases" \
                    --jq '.[] | select(.prerelease == false) | .tag_name' 2>/dev/null \
                    | grep -v "^${CURRENT_TAG}$" | head -n 1 || echo "")
                  [ -n "$PREV_TAG" ] && echo "✓ 找到上一个正式 Release tag: $PREV_TAG"
                else
                  echo "⚠️ GitHub API 未返回有效正式 Release"
                fi
            fi

            # 策略3（再降级）：git tag
            if [ -z "$PREV_TAG" ]; then
              echo "--- 再降级：git tag 查找 ---"
              PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${CURRENT_TAG}$" | head -n 1 || echo "")
              [ -n "$PREV_TAG" ] && echo "✓ Git tag 找到: $PREV_TAG"
            fi

            if [ -n "$PREV_TAG" ]; then
              if git merge-base --is-ancestor "$PREV_TAG" HEAD 2>/dev/null; then
                echo "✓ $PREV_TAG 是 HEAD 的祖先，使用 tag 范围"
                BASE_SHA="$PREV_TAG"
              else
                echo "⚠️ $PREV_TAG 不是 HEAD 的祖先（force-push/rebase），放弃"
              fi
            fi
          fi

          # 收集提交
          if [ -n "$BASE_SHA" ]; then
            echo "✓ git log ${BASE_SHA}..HEAD"
            git log "${BASE_SHA}..HEAD" --pretty=format:"- %s" --no-merges | head -100 > /tmp/commits.txt
          else
            echo "⚠️ 无可用基准，使用最近 30 天的提交"
            git log --since="30 days ago" --pretty=format:"- %s" --no-merges | head -100 > /tmp/commits.txt
          fi

          COMMIT_COUNT=$(wc -l < /tmp/commits.txt | tr -d ' ')
          echo "✓ Found ${COMMIT_COUNT} commits"
          cat /tmp/commits.txt

      - name: Generate Changelog with AI
        id: changelog
        continue-on-error: true
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          AI_API_KEY2: ${{ secrets.AI_API_KEY2 }}
          AI_BASE_URL2: ${{ secrets.AI_BASE_URL2 }}
          AI_MODEL2: ${{ secrets.AI_MODEL2 }}
          AI_API_KEY3: ${{ secrets.AI_API_KEY3 }}
          AI_BASE_URL3: ${{ secrets.AI_BASE_URL3 }}
          AI_MODEL3: ${{ secrets.AI_MODEL3 }}
          RELEASE_VERSION: ${{ steps.version.outputs.tag }}
        run: |
          python3 << 'PYTHON_EOF'
          import textwrap

          exec(compile(textwrap.dedent(r'''
          import json, os, re, urllib.request, sys

          EN_SECTION_TITLE = "### Changes"
          ZH_SECTION_TITLE = "### 更新内容"
          EN_CATEGORY_ORDER = [
              "✨ New Features",
              "🐛 Bug Fixes",
              "⚡ Performance",
              "🔧 Improvements",
          ]
          ZH_CATEGORY_ORDER = [
              "✨ 新功能",
              "🐛 问题修复",
              "⚡ 性能优化",
              "🔧 体验改进",
          ]
          EN_CATEGORY_ALIASES = {
              "✨ New Features": "✨ New Features",
              "New Features": "✨ New Features",
              "### ✨ New Features": "✨ New Features",
              "### New Features": "✨ New Features",
              "🐛 Bug Fixes": "🐛 Bug Fixes",
              "Bug Fixes": "🐛 Bug Fixes",
              "### 🐛 Bug Fixes": "🐛 Bug Fixes",
              "### Bug Fixes": "🐛 Bug Fixes",
              "⚡ Performance": "⚡ Performance",
              "Performance": "⚡ Performance",
              "### ⚡ Performance": "⚡ Performance",
              "### Performance": "⚡ Performance",
              "🔧 Improvements": "🔧 Improvements",
              "Improvements": "🔧 Improvements",
              "### 🔧 Improvements": "🔧 Improvements",
              "### Improvements": "🔧 Improvements",
          }
          ZH_CATEGORY_ALIASES = {
              "✨ 新功能": "✨ 新功能",
              "新功能": "✨ 新功能",
              "### ✨ 新功能": "✨ 新功能",
              "### 新功能": "✨ 新功能",
              "🐛 问题修复": "🐛 问题修复",
              "问题修复": "🐛 问题修复",
              "### 🐛 问题修复": "🐛 问题修复",
              "### 问题修复": "🐛 问题修复",
              "⚡ 性能优化": "⚡ 性能优化",
              "性能优化": "⚡ 性能优化",
              "### ⚡ 性能优化": "⚡ 性能优化",
              "### 性能优化": "⚡ 性能优化",
              "🔧 体验改进": "🔧 体验改进",
              "体验改进": "🔧 体验改进",
              "### 🔧 体验改进": "🔧 体验改进",
              "### 体验改进": "🔧 体验改进",
          }

          def strip_think_tags(text):
              """Remove <think>...</think> blocks and standalone tags from AI output."""
              text = re.sub(r'<think>[\s\S]*?</think>', '', text)
              text = re.sub(r'</?think>', '', text)
              return text.strip()

          def call_ai_with_fallbacks(*args):
              """Try one or more model configs and return on the first successful response."""
              if len(args) == 2:
                model_configs, prompt = args
              elif len(args) == 4:
                base_url, api_key, model, prompt = args
                model_configs = [(base_url, api_key, model)]
              else:
                raise TypeError(
                  "call_ai_with_fallbacks expects (model_configs, prompt) "
                  "or (base_url, api_key, model, prompt)"
                )

              last_exc = None
              for idx, (base_url, api_key, model) in enumerate(model_configs, 1):
                if not base_url or not api_key:
                  print(f"⚠️ {request_label}: model config #{idx} skipped (base_url or api_key is empty)")
                  continue
                payload = {
                  "model": model,
                  "messages": [{"role": "user", "content": prompt}],
                  "max_tokens": 2000,
                  "temperature": 0.3
                }
                try:
                  print(f"→ {request_label}: calling model config #{idx}: {model}")
                  req = urllib.request.Request(
                    f'{base_url}/chat/completions',
                    data=json.dumps(payload).encode('utf-8'),
                    headers={
                      'Content-Type': 'application/json',
                      'Authorization': f'Bearer {api_key}'
                    }
                  )
                  with urllib.request.urlopen(req, timeout=60) as resp:
                    data = json.loads(resp.read())
                  result = strip_think_tags(data['choices'][0]['message']['content'])
                  print(f"✓ {request_label}: succeeded with model config #{idx} ({model})")
                  return {
                    "content": result,
                    "model": model,
                    "config_index": idx,
                  }
                except Exception as e:
                  last_exc = e
                  print(f"⚠️ {request_label}: model config #{idx} ({model}) failed: {e}, trying next...")
              raise last_exc if last_exc else RuntimeError("No valid model config available")

          try:
            version  = os.environ.get('RELEASE_VERSION', '')

            # 构建最多 3 组模型配置，跳过未配置的
            def _cfg(suffix):
              url = os.environ.get(f'AI_BASE_URL{suffix}', '').rstrip('/')
              key = os.environ.get(f'AI_API_KEY{suffix}', '')
              mdl = os.environ.get(f'AI_MODEL{suffix}', '')
              return (url, key, mdl)

            model_configs = [c for c in [_cfg(''), _cfg('2'), _cfg('3')] if c[0] and c[1]]

            try:
              commits = open('/tmp/commits.txt').read().strip()
            except Exception:
              commits = ''
              print('⚠️ Could not read commits.txt')

            if not commits:
              commits = "(no commit records)"

            if not model_configs:
              print("⚠️ No AI model config is set, skipping AI generation")
              fallback_en = f"## {version}\n\n{EN_SECTION_TITLE}\n\n- {commits}"
              fallback_zh = f"## {version}\n\n{ZH_SECTION_TITLE}\n\n- {commits}"
              with open('/tmp/changelog_en.md', 'w', encoding='utf-8') as f:
                f.write(fallback_en)
              with open('/tmp/changelog_zh.md', 'w', encoding='utf-8') as f:
                f.write(fallback_zh)
              exit(0)

            print(f"✓ {len(model_configs)} model config(s) available: {[c[2] for c in model_configs]}")

            # --- Generate English changelog ---
            log_model_configs("Changelog generation", model_configs)
            prompt_en = (
              f"You are a professional software release note writer for a desktop application (Electron + Angular). "
              f"Analyze the following Git commit records and produce a polished, user-facing changelog IN ENGLISH ONLY.\n\n"
              f"Version: {version}\n\n"
              f"Raw commit records:\n{commits}\n\n"
              "## Your task\n"
              "Understand **what changed for the end user**, then write a concise release note. "
              "Do NOT mechanically re-list commit messages — think about the actual impact and summarize.\n\n"
              "## Filtering rules (MUST follow)\n"
              "Completely IGNORE commits that are purely internal and invisible to users, including but not limited to:\n"
              "- CI/CD pipeline changes (GitHub Actions, workflows, build scripts, signing, deployment)\n"
              "- Code refactoring, renaming, restructuring with no behavior change\n"
              "- Dependency version bumps (npm update, package-lock changes) unless they fix a known user-facing issue\n"
              "- Typo fixes in code or comments (not in UI text)\n"
              "- Linting, formatting, code style changes\n"
              "- Merge commits, revert-then-redo sequences\n"
              "- Test additions or modifications\n"
              "- Documentation changes (README, dev docs) unless they are user-facing help docs\n"
              "- Debug logging additions/removals\n\n"
              "## Summarization rules\n"
              "1. Group related commits (e.g. 5 commits about improving serial port connection) into ONE concise bullet point describing the net result.\n"
              "2. Focus on WHAT the user can see/feel, not HOW it was implemented. "
              "Bad: 'Refactored WebSocket reconnection logic'. Good: 'Improved connection stability'.\n"
              "3. Aim for 3–10 bullet points total. If fewer meaningful changes exist, output fewer. Quality over quantity.\n"
              "4. If a feature was added then immediately fixed in follow-up commits, describe only the final working state.\n\n"
              "## Output format\n"
              "- Output must start with exactly these two lines:\n"
              f"  ## {version}\n"
              "  ### Changes\n"
              "- After that, use ONLY these category headings and keep them in this exact order when present: ✨ New Features, 🐛 Bug Fixes, ⚡ Performance, 🔧 Improvements. Omit empty categories.\n"
              "- Do not use any other headings, labels, intro text, outro text, summary sentence, or notes.\n"
              "- Under each category, use bullet points only. No paragraphs outside bullets.\n"
              "- Keep the total bullet count between 3 and 10 when possible.\n"
              "- Do not duplicate categories or repeat the same change in multiple categories.\n"
              "- Output pure Markdown only. No code block wrappers.\n"
              "- Do NOT wrap output in <think> tags or any XML-like tags."
            )

            try:
              en_result = call_ai_with_fallbacks(model_configs, prompt_en, "English changelog generation")
              raw_changelog_en = en_result["content"]
              print(f"ℹ️ English changelog generation final model: {en_result['model']} (config #{en_result['config_index']})")
              print("✓ English changelog generated successfully")
            except Exception as e:
              print(f"⚠️ English changelog AI generation failed on all models: {e}")
              raw_changelog_en = f"## {version}\n\n{EN_SECTION_TITLE}\n\n- {commits}"

            changelog_en, en_valid, en_bullet_count = normalize_changelog_output(
              raw_changelog_en,
              version,
              EN_SECTION_TITLE,
              EN_CATEGORY_ALIASES,
              EN_CATEGORY_ORDER,
            )

            if not en_valid:
              print("⚠️ English changelog format invalid, retrying with repair prompt")
              try:
                repaired_en_result = call_ai_with_fallbacks(
                  model_configs,
                  build_repair_prompt(version, raw_changelog_en, EN_SECTION_TITLE, EN_CATEGORY_ORDER, "English"),
                  "English changelog repair",
                )
                repaired_en = repaired_en_result["content"]
                print(f"ℹ️ English changelog repair final model: {repaired_en_result['model']} (config #{repaired_en_result['config_index']})")
                changelog_en, en_valid, en_bullet_count = normalize_changelog_output(
                  repaired_en,
                  version,
                  EN_SECTION_TITLE,
                  EN_CATEGORY_ALIASES,
                  EN_CATEGORY_ORDER,
                )
              except Exception as e:
                print(f"⚠️ English changelog repair failed: {e}")

            if not en_valid:
              print("⚠️ Falling back to minimal English changelog due to invalid format")
              changelog_en = f"## {version}\n\n{EN_SECTION_TITLE}\n\n🔧 Improvements\n- {commits}\n"
              en_bullet_count = 1

            with open('/tmp/changelog_en.md', 'w', encoding='utf-8') as f:
              f.write(changelog_en)

            print("--- English Changelog Preview ---")
            print(changelog_en[:500])

            # --- Translate English changelog to Chinese ---
            log_model_configs("Changelog translation", model_configs)
            prompt_zh = (
              "You are a professional technical translator for desktop software release notes. "
              "Translate the following English changelog into Simplified Chinese.\n\n"
              f"Version: {version}\n\n"
              "## Source Markdown\n"
              f"{changelog_en}\n\n"
              "## Translation requirements\n"
              "1. Preserve the original Markdown structure exactly: keep the same headings, emoji category markers, bullet structure, and paragraph grouping.\n"
              "2. Use these exact heading translations when they appear in the source: '### Changes' -> '### 更新内容', '✨ New Features' -> '✨ 新功能', '🐛 Bug Fixes' -> '🐛 问题修复', '⚡ Performance' -> '⚡ 性能优化', '🔧 Improvements' -> '🔧 体验改进'. Do not invent extra headings.\n"
              "3. Keep the exact same number of sections and bullet points in the exact same order. Do not merge, split, drop, or add bullets.\n"
              "4. Translate only the user-facing natural language into Simplified Chinese. Keep version numbers, file names, tag names, product names, API names, branch names, and technical identifiers unchanged unless they have a well-established Chinese translation.\n"
              "5. Do not add, remove, infer, soften, or amplify meaning. The Chinese output must be a faithful translation of the English source only.\n"
              "6. Output pure Markdown only. No code fences, no explanations, and no <think> tags or XML-like tags."
            )

            try:
              zh_result = call_ai_with_fallbacks(model_configs, prompt_zh, "Chinese changelog translation")
              raw_changelog_zh = zh_result["content"]
              print(f"ℹ️ Chinese changelog translation final model: {zh_result['model']} (config #{zh_result['config_index']})")
              print("✓ Chinese changelog translated successfully")
            except Exception as e:
              print(f"⚠️ Chinese changelog translation failed on all models: {e}")
              raw_changelog_zh = f"## {version}\n\n{ZH_SECTION_TITLE}\n\n🔧 体验改进\n- （中文翻译生成失败，请查阅 CHANGELOG.md）\n"

            changelog_zh, zh_valid, zh_bullet_count = normalize_changelog_output(
              raw_changelog_zh,
              version,
              ZH_SECTION_TITLE,
              ZH_CATEGORY_ALIASES,
              ZH_CATEGORY_ORDER,
            )

            if not zh_valid or zh_bullet_count != en_bullet_count:
              print("⚠️ Chinese changelog format invalid or bullet count mismatch, retrying with stricter translation")
              strict_prompt_zh = (
                prompt_zh
                + f"\n\n## Additional hard constraints\n"
                + f"- The output must contain exactly {en_bullet_count} bullet points in total.\n"
                + "- Keep every bullet aligned one-to-one with the English source.\n"
              )
              try:
                repaired_zh_result = call_ai_with_fallbacks(model_configs, strict_prompt_zh, "Chinese changelog repair")
                repaired_zh = repaired_zh_result["content"]
                print(f"ℹ️ Chinese changelog repair final model: {repaired_zh_result['model']} (config #{repaired_zh_result['config_index']})")
                changelog_zh, zh_valid, zh_bullet_count = normalize_changelog_output(
                  repaired_zh,
                  version,
                  ZH_SECTION_TITLE,
                  ZH_CATEGORY_ALIASES,
                  ZH_CATEGORY_ORDER,
                )
              except Exception as e:
                print(f"⚠️ Chinese changelog repair failed: {e}")

            if not zh_valid or zh_bullet_count != en_bullet_count:
              print("⚠️ Falling back to minimal Chinese changelog due to invalid format")
              changelog_zh = f"## {version}\n\n{ZH_SECTION_TITLE}\n\n🔧 体验改进\n- （中文翻译生成失败，请查阅 CHANGELOG.md）\n"

            with open('/tmp/changelog_zh.md', 'w', encoding='utf-8') as f:
              f.write(changelog_zh)

            print("--- Chinese Changelog Preview ---")
            print(changelog_zh[:500])

          except Exception as e:
            print(f"⚠️ Changelog generation encountered an unexpected error: {e}")
            try:
              with open('/tmp/changelog_en.md', 'w', encoding='utf-8') as f:
                f.write(f"## {os.environ.get('RELEASE_VERSION', 'Unknown')}\n\n### Changes\n\n(Changelog generation failed, please check git log)")
              with open('/tmp/changelog_zh.md', 'w', encoding='utf-8') as f:
                f.write(f"## {os.environ.get('RELEASE_VERSION', 'Unknown')}\n\n### 更新内容\n\n（Changelog 生成失败，请查阅 git log）")
            except Exception:
              pass
          '''), '<generate-changelog>', 'exec'))
          PYTHON_EOF

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: AilyBlockly-Windows-Package
          path: ./release

      - name: Download Windows CN Artifact
        uses: actions/download-artifact@v4
        with:
          name: AilyBlockly-Windows-Package-cn
          path: ./release-cn

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: AilyBlockly-macOS-Package
          path: ./release

      - name: Download macOS CN Artifact
        uses: actions/download-artifact@v4
        with:
          name: AilyBlockly-macOS-Package-cn
          path: ./release-mac-cn

      - name: Prepare Changelog Files
        id: release_body
        run: |
          # 若英文 changelog 文件不存在（上一步失败），生成兜底内容
          if [ ! -f /tmp/changelog_en.md ]; then
            echo "⚠️ changelog_en.md not found, using fallback"
            echo "## ${{ steps.version.outputs.tag }}" > /tmp/changelog_en.md
            echo "" >> /tmp/changelog_en.md
            echo "### Changes" >> /tmp/changelog_en.md
            echo "" >> /tmp/changelog_en.md
            echo "(Changelog generation failed, please check git log)" >> /tmp/changelog_en.md
          fi

          # 若中文 changelog 文件不存在，生成兜底内容
          if [ ! -f /tmp/changelog_zh.md ]; then
            echo "⚠️ changelog_zh.md not found, using fallback"
            echo "## ${{ steps.version.outputs.tag }}" > /tmp/changelog_zh.md
            echo "" >> /tmp/changelog_zh.md
            echo "### 更新内容" >> /tmp/changelog_zh.md
            echo "" >> /tmp/changelog_zh.md
            echo "（Changelog 生成失败，请查阅 git log）" >> /tmp/changelog_zh.md
          fi

          # 复制 changelog 到 release 目录，作为附件
          cp /tmp/changelog_en.md ./release/CHANGELOG.md
          cp /tmp/changelog_zh.md ./release/CHANGELOG_ZH.md
          echo "✓ CHANGELOG.md and CHANGELOG_ZH.md saved to release directory"

          # 将英文 changelog 内容写入 GitHub Output，作为 Release body
          # 注意：cat 后补一个空行，防止文件末尾无换行导致分隔符被拼接
          {
            echo 'body<<CHANGELOG_DELIMITER'
            cat /tmp/changelog_en.md
            echo ''
            echo 'CHANGELOG_DELIMITER'
          } >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.release_body.outputs.body }}
          files: |
            ./release/*.exe
            ./release-cn/*.exe
            ./release/*.dmg
            ./release/*.zip
            ./release-mac-cn/*.dmg
            ./release-mac-cn/*.zip
            ./release/CHANGELOG.md
            ./release/CHANGELOG_ZH.md
          draft: false
          prerelease: ${{ github.ref_name == 'beta' }}
          make_latest: ${{ github.ref_name == 'deploy' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Archive CHANGELOG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AilyBlockly-Changelog
          path: |
            ./release/CHANGELOG.md
            ./release/CHANGELOG_ZH.md

      - name: Save Release SHA to release-meta branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          CURRENT_SHA="${{ github.sha }}"
          FILE_NAME="last-sha-${BRANCH_NAME}"
          COMMIT_MSG="chore: update last release SHA for ${BRANCH_NAME} [${CURRENT_SHA:0:7}]"

          # base64 编码内容（含换行符）
          CONTENT=$(printf '%s\n' "$CURRENT_SHA" | base64 -w 0)

          # 确保 release-meta 分支存在，不存在则以当前 SHA 为基础创建
          if ! gh api "repos/${GITHUB_REPOSITORY}/git/refs/heads/release-meta" --silent 2>/dev/null; then
            echo "release-meta 分支不存在，正在创建..."
            gh api "repos/${GITHUB_REPOSITORY}/git/refs" \
              --method POST \
              -f ref="refs/heads/release-meta" \
              -f sha="${CURRENT_SHA}"
            echo "✓ release-meta 分支已创建"
          fi

          # 获取文件当前 SHA（更新时需要，文件不存在时为空）
          FILE_SHA=$(gh api "repos/${GITHUB_REPOSITORY}/contents/${FILE_NAME}?ref=release-meta" \
            --jq '.sha' 2>/dev/null || echo "")

          if [ -n "$FILE_SHA" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/contents/${FILE_NAME}" \
              --method PUT \
              -f message="$COMMIT_MSG" \
              -f content="$CONTENT" \
              -f sha="$FILE_SHA" \
              -f branch="release-meta"
          else
            gh api "repos/${GITHUB_REPOSITORY}/contents/${FILE_NAME}" \
              --method PUT \
              -f message="$COMMIT_MSG" \
              -f content="$CONTENT" \
              -f branch="release-meta"
          fi

          echo "✓ Saved SHA $CURRENT_SHA for branch $BRANCH_NAME"

  # 任务 4a：上传 Windows 文件到 Cloudflare R2 存储（与Release并行执行）
  upload-windows-to-r2:
    needs: [build-windows, build-windows-cn]
    if: github.ref_name == 'deploy'
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows Global Artifact
        uses: actions/download-artifact@v4
        with:
          name: AilyBlockly-Windows-Package
          path: ./artifacts/windows/global

      - name: Download Windows CN Artifact
        uses: actions/download-artifact@v4
        with:
          name: AilyBlockly-Windows-Package-cn
          path: ./artifacts/windows/cn

      - name: Ensure AWS CLI is available
        run: |
          if ! command -v aws &> /dev/null; then
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip awscliv2.zip
            sudo ./aws/install
          fi
          aws --version

      - name: Upload Windows files to Cloudflare R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_UPLOAD_PATH: ${{ secrets.R2_UPLOAD_PATH }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          # 配置 AWS CLI 使用 Cloudflare R2
          aws configure set aws_access_key_id "$R2_ACCESS_KEY_ID"
          aws configure set aws_secret_access_key "$R2_SECRET_ACCESS_KEY"
          aws configure set default.region auto
          
          # Cloudflare R2 endpoint
          R2_ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          
          echo "准备上传 Windows 文件到 Cloudflare R2..."

          upload_windows_dir() {
            local artifact_dir="$1"
            local manifest_name="$2"

            if [ ! -d "$artifact_dir" ]; then
              echo "  ⚠️ 目录不存在，跳过: $artifact_dir"
              return
            fi
          
            echo "上传 ${artifact_dir} 下的 Windows exe 文件..."
            for file in "$artifact_dir"/*.exe; do
              if [ -f "$file" ]; then
                filename=$(basename "$file")
                echo "  上传: $filename"
                aws s3 cp "$file" "s3://${R2_BUCKET_NAME}/${R2_UPLOAD_PATH}/${filename}" \
                  --endpoint-url "$R2_ENDPOINT" \
                  --content-type "application/x-msdownload"
              fi
            done

            local manifest_path="${artifact_dir}/${manifest_name}"
            echo "上传 ${manifest_name} 配置文件..."
            if [ -f "$manifest_path" ]; then
              aws s3 cp "$manifest_path" "s3://${R2_BUCKET_NAME}/${R2_UPLOAD_PATH}/${manifest_name}" \
                --endpoint-url "$R2_ENDPOINT" \
                --content-type "text/yaml" \
                --cache-control "no-cache, no-store, must-revalidate"
            else
              echo "  ⚠️ ${manifest_name} not found under ${artifact_dir}, skipping"
            fi
          }

          upload_windows_dir "./artifacts/windows/global" "latest.yml"
          upload_windows_dir "./artifacts/windows/cn" "latest-cn.yml"
          
          echo "✓ Windows 文件上传到 Cloudflare R2 完成"
          echo "公开访问地址: ${R2_PUBLIC_URL}"

  # 任务 4c：上传 CHANGELOG 文件到 Cloudflare R2 存储
  upload-changelog-to-r2:
    needs: [release]
    if: github.ref_name == 'deploy'
    runs-on: ubuntu-latest
    steps:
      - name: Download CHANGELOG Artifact
        uses: actions/download-artifact@v4
        with:
          name: AilyBlockly-Changelog
          path: ./artifacts

      - name: Ensure AWS CLI is available
        run: |
          if ! command -v aws &> /dev/null; then
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip awscliv2.zip
            sudo ./aws/install
          fi
          aws --version

      - name: Upload CHANGELOG files to Cloudflare R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_UPLOAD_PATH: ${{ secrets.R2_UPLOAD_PATH }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          aws configure set aws_access_key_id "$R2_ACCESS_KEY_ID"
          aws configure set aws_secret_access_key "$R2_SECRET_ACCESS_KEY"
          aws configure set default.region auto
          
          R2_ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          
          echo "上传 CHANGELOG 文件到 Cloudflare R2..."
          
          # upload-artifact@v4 uses least-common-ancestor stripping: both files are under
          # ./release/ so that prefix is stripped; files land directly under ./artifacts/
          for file in CHANGELOG.md CHANGELOG_ZH.md; do
            filepath="./artifacts/${file}"
            if [ -f "${filepath}" ]; then
              echo "  上传: ${file}"
              aws s3 cp "${filepath}" "s3://${R2_BUCKET_NAME}/${R2_UPLOAD_PATH}/${file}" \
                --endpoint-url "$R2_ENDPOINT" \
                --content-type "text/markdown; charset=utf-8"
            else
              echo "  ⚠️ ${file} not found, skipping"
            fi
          done
          
          echo "✓ CHANGELOG 文件上传到 Cloudflare R2 完成"

  # 任务 4b：上传 macOS 文件到 Cloudflare R2 存储（与Release并行执行）
  upload-macos-to-r2:
    needs: [build-macos, build-macos-cn]
    if: github.ref_name == 'deploy'
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS Global Artifact
        uses: actions/download-artifact@v4
        with:
          name: AilyBlockly-macOS-Package
          path: ./artifacts/macos/global

      - name: Download macOS CN Artifact
        uses: actions/download-artifact@v4
        with:
          name: AilyBlockly-macOS-Package-cn
          path: ./artifacts/macos/cn

      - name: Ensure AWS CLI is available
        run: |
          if ! command -v aws &> /dev/null; then
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip awscliv2.zip
            sudo ./aws/install
          fi
          aws --version

      - name: Upload macOS files to Cloudflare R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_UPLOAD_PATH: ${{ secrets.R2_UPLOAD_PATH }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          # 配置 AWS CLI 使用 Cloudflare R2
          aws configure set aws_access_key_id "$R2_ACCESS_KEY_ID"
          aws configure set aws_secret_access_key "$R2_SECRET_ACCESS_KEY"
          aws configure set default.region auto
          
          # Cloudflare R2 endpoint
          R2_ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          
          echo "准备上传 macOS 文件到 Cloudflare R2..."

          upload_macos_dir() {
            local artifact_dir="$1"
            local manifest_name="$2"

            if [ ! -d "$artifact_dir" ]; then
              echo "  ⚠️ 目录不存在，跳过: $artifact_dir"
              return
            fi

            echo "上传 ${artifact_dir} 下的 macOS 文件..."
            for file in "$artifact_dir"/*.dmg "$artifact_dir"/*.zip; do
              if [ -f "$file" ]; then
                filename=$(basename "$file")
                echo "  上传: $filename"

                if [[ "$filename" == *.dmg ]]; then
                  content_type="application/x-apple-diskimage"
                else
                  content_type="application/zip"
                fi

                aws s3 cp "$file" "s3://${R2_BUCKET_NAME}/${R2_UPLOAD_PATH}/${filename}" \
                  --endpoint-url "$R2_ENDPOINT" \
                  --content-type "$content_type"
              fi
            done

            local manifest_path="${artifact_dir}/${manifest_name}"
            echo "上传 ${manifest_name} 配置文件..."
            if [ -f "$manifest_path" ]; then
              aws s3 cp "$manifest_path" "s3://${R2_BUCKET_NAME}/${R2_UPLOAD_PATH}/${manifest_name}" \
                --endpoint-url "$R2_ENDPOINT" \
                --content-type "text/yaml" \
                --cache-control "no-cache, no-store, must-revalidate"
            else
              echo "  ⚠️ ${manifest_name} not found under ${artifact_dir}, skipping"
            fi
          }

          upload_macos_dir "./artifacts/macos/global" "latest-mac.yml"
          upload_macos_dir "./artifacts/macos/cn" "latest-mac-cn.yml"
          
          echo "✓ macOS 文件上传到 Cloudflare R2 完成"
          echo "公开访问地址: ${R2_PUBLIC_URL}"

