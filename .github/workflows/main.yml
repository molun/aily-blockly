  # 任务 5：触发服务器脚本
  trigger-server-script:
    needs: [upload-windows-to-r2]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Server Script
        env:
          SERVER_HOST: ${{ secrets.TRIGGER_SERVER_HOST }}
          SERVER_USER: ${{ secrets.TRIGGER_SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.TRIGGER_SERVER_PASSWORD }}
          SERVER_SCRIPT_PATH: ${{ secrets.TRIGGER_SERVER_SCRIPT_PATH }}
        run: |
          sudo apt-get update && sudo apt-get install -y sshpass
          echo "触发服务器脚本..."
          sshpass -p "$SERVER_PASSWORD" ssh -o StrictHostKeyChecking=no "$SERVER_USER@$SERVER_HOST" "bash $SERVER_SCRIPT_PATH"
          echo "✓ 脚本执行完成"
