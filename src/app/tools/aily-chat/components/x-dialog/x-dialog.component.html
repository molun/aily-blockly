<div
  class="dialog-box animate__animated animate__fadeIn animate__faster"
  [ngClass]="{ user: role === 'user', subagent: isSubagent }"
>
  <div class="username">
    @if (role === "user") {
      <i class="fa-light fa-user-vneck"></i>&nbsp;&nbsp;me
    } @else if (isSubagent) {
      <!-- <i class="fa-light fa-users-gear"></i>&nbsp;&nbsp; -->
      <i class="fa-light fa-user-astronaut"></i>&nbsp;&nbsp;aily
      <!-- <span class="subagent-name">{{ subagentDisplayName }}</span> -->
      <span class="subagent-badge">{{ subagentDisplayName }}</span>
    } @else {
      <i class="fa-light fa-user-astronaut"></i>&nbsp;&nbsp;aily
    }
  </div>
  <div class="content" [class.thinking]="content==='[thinking...]'">
    <!-- @if(content==='[thinking...]'){
      <div class="thinking">
        <span class="thinking-text">Thinking</span>
        <span class="wave-dots">
          <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </span>
      </div>
    } -->
    @if (streamContent()) {
      <x-markdown
        [content]="streamContent()"
        [streaming]="streamingConfig()"
        [components]="componentMap"
        rootClassName="x-markdown-dark"
      >
      </x-markdown>
    }
  </div>
  @if (doing || content==='[thinking...]') {
    <div class="loader"></div>
  }
</div>
